<!doctype html>
<!-- ============================================================================
  USER GUIDE TEMPLATE (agent-browser-qa skill)
  วิธีใช้: 1) แก้ META + data[] ในแท็ก <script> ด้านล่าง  2) วาง screenshot ใน shots/
           3) agent-browser open <ไฟล์นี้> → wait 6000 → agent-browser pdf out.pdf
  โครง data: scenario { title,color(s1..s4),ov{what,why,when}, steps[ {act,crumb[],url,img,
             do,res,why, fields[[ชื่อ,รายละเอียด,ตัวอย่าง]], note?, warn?} ] }
  ใช้ D (=="—") ในช่อง "ตัวอย่าง" เมื่อไม่มีค่า. ดู references/pdf-reports.md สำหรับ gotcha PDF.
============================================================================= -->
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>คู่มือการใช้งาน</title>
<style>
  @page{size:182mm 250mm;margin:13mm 13mm 12mm;
    @bottom-right{content:"หน้า " counter(page) " / " counter(pages);font-size:9.5px;color:#8a93a3}
    @top-right{content:"__DOC_TITLE__";font-size:9px;color:#b6bcc8}}
  html,body{margin:0}
  :root{--blue:#1f5fbf;--blue-d:#16438a;--muted:#5a6678;--line:#d8dee8;--tbl-head:#eaf1fb;--tbl-alt:#f7f9fc;--ov:#eef5ff}
  *{box-sizing:border-box}
  body{font-family:"Segoe UI","Sarabun",system-ui,sans-serif;margin:0;background:#9aa3b2;color:#222;line-height:1.6;font-size:14px}
  .doc{max-width:900px;margin:0 auto;background:#fff}
  .toolbar{max-width:900px;margin:14px auto 0;padding:0 6px}.printbtn{background:var(--blue);color:#fff;border:0;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:600}
  .coverpage{break-after:page;text-align:center;padding-top:52mm}
  .coverpage .logo{width:104px;height:104px;margin:0 auto 22px;display:block}
  .coverpage h1{color:var(--blue-d);font-size:36px;margin:0 0 8px}.coverpage .sub{color:var(--blue);font-size:18px;font-weight:600;margin:0 0 4px}
  .coverpage .tagline{color:var(--muted);font-size:14px;margin:0 0 28px}.coverpage .cdivider{width:90px;height:3px;background:var(--blue);margin:0 auto 26px;border-radius:2px}
  .coverpage .metabox{display:inline-block;text-align:left;border:1px solid var(--line);border-radius:10px;padding:16px 22px;background:#f7f9fc;font-size:13.5px;color:#33405c;min-width:340px}
  .coverpage .metabox div{margin:5px 0}.coverpage .metabox b{color:var(--blue-d);display:inline-block;min-width:120px}
  .toc{break-after:page;margin-top:24px}.toc h2{color:var(--blue-d);font-size:20px;margin:0 0 10px;border-bottom:2px solid var(--line);padding-bottom:6px}
  .toc ul{list-style:none;padding:0;margin:0}.toc li{margin:5px 0}.toc li.scn{font-weight:700;margin-top:12px}.toc li.step{padding-left:22px;font-size:13.5px}
  .toc a{text-decoration:none;color:var(--blue-d);display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px dotted #c7d0de;padding-bottom:2px}
  .toc li.step a{color:#34405c}.toc a::after{content:target-counter(attr(href),page);color:#7a8499;font-weight:400;white-space:nowrap}
  .scn-divider{break-before:page;padding:12px 16px;border-radius:8px 8px 0 0;color:#fff;font-size:18px;font-weight:700}
  .s1{background:#178a4c}.s2{background:#1f5fbf}.s3{background:#c97a12}.s4{background:#c0392b}.sys-h{background:#5b21b6}.faq-h{background:#0e7490}.gloss-h{background:#475569}
  .overview{border:1px solid var(--line);border-top:0;border-radius:0 0 8px 8px;background:var(--ov);padding:14px 18px;margin-bottom:8px}.overview p{margin:6px 0;font-size:13.5px}.overview b{color:var(--blue-d)}
  .sec{color:var(--blue-d);font-size:19px;font-weight:700;margin:26px 0 4px;break-after:avoid}
  .crumb{color:var(--blue);font-size:13.5px;font-weight:600;margin:0 0 12px}.crumb .sep{color:#9bb4d8;margin:0 4px}.crumb .url{color:var(--muted);font-weight:400;font-size:12px}
  .shot{border:1px solid var(--line);border-radius:4px;overflow:hidden;margin:6px 0 14px;break-inside:avoid}.shot img{width:100%;display:block}
  .do{margin:0 0 8px}.res{color:#178a4c;font-weight:600;font-size:13.5px;margin:0 0 10px}.res::before{content:"➜ "}
  .why{background:#f3f6fc;border-left:4px solid var(--blue);padding:9px 14px;border-radius:6px;font-size:13.5px;margin:0 0 14px;color:#33405c;break-inside:avoid}.why b{color:var(--blue-d)}
  .detail-label{color:var(--blue-d);font-weight:700;font-size:14.5px;margin:6px 0 6px}
  table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--line);margin-bottom:8px;break-inside:avoid}
  thead th{background:var(--tbl-head);color:var(--blue-d);text-align:left;padding:8px 11px;border:1px solid var(--line);font-size:12.5px}
  td{padding:8px 11px;border:1px solid var(--line);vertical-align:top}tbody tr:nth-child(even){background:var(--tbl-alt)}td.k{font-weight:700;white-space:nowrap}
  td.ex code{background:#fdeef4;color:#b4286b;padding:2px 7px;border-radius:5px;font-size:12px}.dash{color:#b7c0cf}
  .note{border-left:4px solid #e0a900;background:#fff8e6;padding:9px 14px;border-radius:6px;font-size:13px;margin:10px 0 0;break-inside:avoid}
  .warn{border-left:4px solid #c0392b;background:#fdeaea;padding:9px 14px;border-radius:6px;font-size:13px;margin:10px 0 0;break-inside:avoid}
  .secblock{border:1px solid var(--line);border-top:0;border-radius:0 0 8px 8px;padding:14px 18px;margin-bottom:14px}
  .qa{border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:0 0 12px;break-inside:avoid}.qa .q{font-weight:700;color:var(--blue-d);margin:0 0 4px}.qa .q::before{content:"Q: "}.qa .a::before{content:"A: ";font-weight:700;color:#178a4c}
  dl.gloss{margin:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}dl.gloss>div{display:grid;grid-template-columns:33% 67%;border-bottom:1px solid #eef1f7}dl.gloss>div:nth-child(even){background:var(--tbl-alt)}
  dl.gloss dt{font-weight:700;color:var(--blue-d);padding:8px 12px;font-size:13.5px}dl.gloss dd{margin:0;padding:8px 12px;font-size:13.5px;border-left:1px solid #eef1f7}
  @media print{body{background:#fff;font-size:12px}.toolbar{display:none}.pagedjs_page{margin:0!important;box-shadow:none!important}}
  @media screen{.pagedjs_page{background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.25);margin:10mm auto}}
</style></head><body>
<div class="toolbar"><button class="printbtn" onclick="window.print()">🖨️ พิมพ์ / บันทึกเป็น PDF</button></div>
<div class="doc" id="doc"></div>

<script>
/* ===== EDIT HERE: META + ข้อมูล ===== */
const META={title:"คู่มือการใช้งาน <ระบบ>",sub:"User Guide",tagline:"คู่มือใช้งาน · เข้าใจการทำงานของ UI ทีละขั้น",
  meta:[["ขอบเขต","N Scenario · M ขั้นตอน"],["เวอร์ชัน","1.0"],["วันที่","DD MMMM YYYY"],["ที่มาของภาพ","รันจริงด้วย agent-browser"]]};
const D="—";
const data=[
 {color:"s1",id:"scn-1",title:"✅ Scenario 1 — <ชื่อ flow>",
  ov:{what:"<feature นี้คืออะไร + บริบท>",why:"<ทำเพื่ออะไร / สำคัญยังไง>",when:"<เมื่อไรใช้>"},
  steps:[
   {act:"<ชื่อขั้นตอน>",crumb:["<ระบบ>","<หน้า>"],url:"<path/url>",img:"shots/01.png",
    do:"<วิธีทำ — กดปุ่ม X (กรอบแดง)>",res:"<ผลที่เห็น>",
    why:"<ทำงานอย่างไร / ทำไม / ผลต่อระบบ>",
    fields:[["<ฟิลด์/ปุ่ม>","<คืออะไร>","<ตัวอย่างค่า>"],["<ปุ่ม>","<หน้าที่>",D]],
    note:"💡 <ทิป (ถ้ามี)>"},
   {act:"<ขั้นตอนถัดไป>",crumb:["<ระบบ>","<หน้า>"],url:"<path>",img:"shots/02.png",
    do:"<วิธีทำ>",res:"<ผล>",why:"<อธิบาย>",
    fields:[["<ฟิลด์>","<คืออะไร>","<ตัวอย่าง>"]]},
  ]},
 /* เพิ่ม scenario อื่นได้: color s2/s3/s4 */
];
/* ผลต่อระบบหลังทำรายการ: [การกระทำ, ผลที่สังเกตจริง, เทียบระบบจริง] (ลบทั้ง section ได้ถ้าไม่ใช้) */
const SYS=[["<การกระทำ>","<ผลที่สังเกตจริง>","<เทียบระบบจริง>"]];
const SYS_NOTE="หมายเหตุ: <อธิบายขอบเขต demo vs ระบบจริง>";
const FAQ=[["<คำถามที่พบบ่อย>","<คำตอบ>"]];               // ลบได้ถ้าไม่ใช้
const GLOSS=[["<คำศัพท์>","<ความหมาย>"]];                  // ลบได้ถ้าไม่ใช้
/* ===== จบส่วนแก้ ===== */

document.title=META.title; document.querySelector('style').textContent=document.querySelector('style').textContent.replace('__DOC_TITLE__',META.title);
const S="";
// escape ค่าที่มาจาก data[]/META (run จริง) ก่อนใส่ innerHTML — กัน content ที่มี <>& พังหน้า/execute.
// ใช้เฉพาะ text จากผู้ใช้; markup/SVG ที่ template สร้างเองไม่ต้องครอบ.
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const logoSVG=`<svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#1f5fbf" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 7.5h13l-1.1 12.2a1.5 1.5 0 0 1-1.5 1.3H8.1a1.5 1.5 0 0 1-1.5-1.3L5.5 7.5z" fill="#eaf1fb"/><path d="M9 7.5V5.6a3 3 0 0 1 6 0v1.9"/><path d="M9 13.2l2.1 2.1L15 11" stroke="#178a4c" stroke-width="1.9"/></svg>`;
const cover=`<div class="coverpage">${logoSVG}<h1>${esc(META.title)}</h1><div class="sub">${esc(META.sub)}</div><div class="tagline">${esc(META.tagline)}</div><div class="cdivider"></div><div class="metabox">${META.meta.map(m=>`<div><b>${esc(m[0])}:</b> ${esc(m[1])}</div>`).join("")}</div></div>`;
const crumbH=(c,u)=>`<p class="crumb">${c.map(x=>`<span>${esc(x)}</span>`).join('<span class="sep">›</span>')} <span class="url">(${esc(u)})</span></p>`;
const tblH=f=>`<table><thead><tr><th style="width:28%">ฟิลด์ / ปุ่ม</th><th>รายละเอียด</th><th style="width:30%">ค่าที่ระบุ / ตัวอย่าง</th></tr></thead><tbody>${f.map(([k,w,e])=>`<tr><td class="k">${esc(k)}</td><td>${esc(w)}</td><td class="ex">${e===D?'<span class="dash">—</span>':'<code>'+esc(e)+'</code>'}</td></tr>`).join("")}</tbody></table>`;
let n=0,toc=`<div class="toc"><h2>สารบัญ</h2><ul>`,body="";
data.forEach(scn=>{toc+=`<li class="scn"><a href="#${scn.id}">${esc(scn.title)}</a></li>`;
  body+=`<div class="scn-divider ${scn.color}" id="${scn.id}">${esc(scn.title)}</div><div class="overview"><p><b>📘 คืออะไร:</b> ${esc(scn.ov.what)}</p><p><b>🎯 ทำเพื่ออะไร:</b> ${esc(scn.ov.why)}</p><p><b>🕐 เมื่อไรใช้:</b> ${esc(scn.ov.when)}</p></div>`;
  scn.steps.forEach(st=>{n++;const id="sec-"+n;toc+=`<li class="step"><a href="#${id}">${n}. ${esc(st.act)}</a></li>`;
    body+=`<h2 class="sec" id="${id}">${n}. ${esc(st.act)}</h2>`+crumbH(st.crumb,st.url)+`<div class="shot"><img src="${esc(S+st.img)}" alt="${esc(st.act)}"></div><p class="do">▸ <b>วิธีทำ:</b> ${esc(st.do)}</p><p class="res">${esc(st.res)}</p><div class="why"><b>💬 ทำงานอย่างไร / ทำไม:</b> ${esc(st.why)}</div><div class="detail-label">รายละเอียดการระบุข้อมูล</div>`+tblH(st.fields);
    if(st.note)body+=`<div class="note">${esc(st.note)}</div>`; if(st.warn)body+=`<div class="warn">${esc(st.warn)}</div>`;});});
if(SYS&&SYS.length){toc+=`<li class="scn"><a href="#sys">ผลต่อระบบหลังทำรายการ</a></li>`;body+=`<div class="scn-divider sys-h" id="sys">🧩 ผลต่อระบบหลังทำรายการ</div><div class="secblock"><table><thead><tr><th style="width:24%">การกระทำ</th><th>ผลที่สังเกตจริง</th><th>เทียบระบบจริงทั่วไป</th></tr></thead><tbody>${SYS.map(r=>`<tr><td class="k">${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join("")}</tbody></table><div class="note">${esc(SYS_NOTE)}</div></div>`;}
if(FAQ&&FAQ.length){toc+=`<li class="scn"><a href="#faq">FAQ / ปัญหาที่พบบ่อย</a></li>`;body+=`<div class="scn-divider faq-h" id="faq">❓ FAQ / ปัญหาที่พบบ่อย</div><div class="secblock">${FAQ.map(([q,a])=>`<div class="qa"><p class="q">${esc(q)}</p><p class="a">${esc(a)}</p></div>`).join("")}</div>`;}
if(GLOSS&&GLOSS.length){toc+=`<li class="scn"><a href="#gloss">อภิธานศัพท์ (Glossary)</a></li>`;body+=`<div class="scn-divider gloss-h" id="gloss">📖 อภิธานศัพท์ (Glossary)</div><div class="secblock"><dl class="gloss">${GLOSS.map(([t,d])=>`<div><dt>${esc(t)}</dt><dd>${esc(d)}</dd></div>`).join("")}</dl></div>`;}
toc+=`</ul></div>`;
document.getElementById("doc").innerHTML=cover+toc+body;
</script>
<script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
</body></html>
